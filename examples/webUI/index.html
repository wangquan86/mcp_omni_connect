<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Web Client</title>
    <style>
        :root {
            --primary: #10a37f;
            --background: #ffffff;
            --surface: #f7f7f8;
            --text-primary: #343541;
            --text-secondary: #6e6e80;
            --border-color: #e5e5e5;
        }

        body {
            font-family: 'Söhne', 'Inter', system-ui, -apple-system, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
            background-color: var(--background);
            color: var(--text-primary);
        }

        .app-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .app-logo {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--primary);
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        .chat-container {
            background-color: var(--background);
            border-radius: 0.75rem;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
            padding: 1rem;
            height: 70vh;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
        }

        .messages {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 1rem;
            padding: 1rem;
            border-radius: 0.5rem;
            scrollbar-width: thin;
            scrollbar-color: #d9d9e3 transparent;
        }

        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .messages::-webkit-scrollbar-thumb {
            background-color: #d9d9e3;
            border-radius: 3px;
        }

        .message {
            margin-bottom: 1.25rem;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            max-width: 90%;
            position: relative;
            line-height: 1.5;
        }

        .user-message {
            background: #f7f7f8;
            color: var(--text-primary);
            margin-left: auto;
            border: 1px solid var(--border-color);
        }

        .assistant-message {
            background: #f7f7f8;
            color: var(--text-primary);
            margin-right: auto;
            border: 1px solid var(--border-color);
        }

        .input-container {
            display: flex;
            gap: 0.5rem;
            padding: 0.5rem;
            background: var(--background);
            border-radius: 0.5rem;
            border: 1px solid var(--border-color);
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 0.75rem;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1rem;
            border-radius: 0.5rem;
        }

        input[type="text"]:focus {
            outline: none;
        }

        input[type="text"]::placeholder {
            color: var(--text-secondary);
        }

        button {
            padding: 0.6rem 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        button:hover {
            background-color: #0e906f;
        }

        button:active {
            transform: scale(0.98);
        }

        .timestamp {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .loading-dots {
            display: flex;
            gap: 0.5rem;
            padding: 0.5rem;
        }

        .loading-dots span {
            width: 6px;
            height: 6px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: pulse 1.4s infinite;
        }

        .loading-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            padding: 0.5rem;
            margin-top: 0.5rem;
        }

        .status-indicator .dot {
            width: 8px;
            height: 8px;
            background-color: var(--primary);
            border-radius: 50%;
        }

        .message-content {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --primary: #10a37f;
                --background: #343541;
                --surface: #444654;
                --text-primary: #ececf1;
                --text-secondary: #acacbe; 
                --border-color: #565869;
            }
            
            .user-message, .assistant-message {
                background: var(--surface);
            }
        }
    </style>
</head>
<body>
    <div class="app-header">
        <div class="app-logo">MCP Web Client</div>
    </div>

    <div class="chat-container">
        <div class="messages" id="messages"></div>
        <div class="input-container">
            <input type="text" id="userInput" placeholder="想问什么...">
            <button onclick="sendMessage()">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
                Send
            </button>
        </div>
    </div>

    <div class="status-indicator">
        <div class="dot"></div>
        <span>Connected to MCP server</span>
    </div>

    <script>
        const messagesContainer = document.getElementById('messages');
        const userInput = document.getElementById('userInput');

        // Add welcome message
        window.onload = function() {
            setTimeout(() => {
                addMessage('assistant', '欢迎你使用 MCP Web Client! 有什么需要帮助吗?');
            }, 500);
        };

        function createLoadingDots() {
            const container = document.createElement('div');
            container.className = 'loading-dots';
            container.innerHTML = `
                <span></span>
                <span></span>
                <span></span>
            `;
            return container;
        }

        function formatMessage(content) {
            // Format price
            content = content.replace(/(\$?\d+\.\d+)\s*dollars/, '<div class="price-highlight">$1 USD</div>');

            // Format headers
            content = content.replace(/###\s*(.*)/g, '<h3>$1</h3>');

            // Format bold text
            content = content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

            // Format links
            content = content.replace(/\[([^\]]+)\]\(([^\)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

            // Format numbered list items
            content = content.replace(/(\d+)\.\s+\*\*(.*?)\*\*:(.*?)(?=\d+\.|$)/g,
                '<div class="news-item"><strong>$2</strong>$3</div>');

            return content;
        }

        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', `${role}-message`);

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = formatMessage(content);

            const timestamp = document.createElement('div');
            timestamp.className = 'timestamp';
            timestamp.textContent = new Date().toLocaleTimeString([], {
                hour: '2-digit',
                minute: '2-digit'
            });

            messageDiv.appendChild(contentDiv);
            messageDiv.appendChild(timestamp);
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        async function sendMessage() {
            const query = userInput.value.trim();
            if (!query) return;

            addMessage('user', query);
            userInput.value = '';

            const loading = createLoadingDots();
            messagesContainer.appendChild(loading);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            try {
                const response = await fetch('http://localhost:8000/chat/agent_chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                            query: query,
                            chat_id: "cc1c9dbe-4344-4511-b98b-f563d2526d6a"
                        })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const text = decoder.decode(value);
                    const messages = text.split('\n').filter(msg => msg.trim());

                    for (const msg of messages) {
                        try {
                            const parsed = JSON.parse(msg);
                            messagesContainer.removeChild(loading);
                            addMessage(parsed.role, parsed.content);
                        } catch (e) {
                            console.error('Error parsing message:', e);
                        }
                    }
                }
            } catch (error) {
                messagesContainer.removeChild(loading);
                addMessage('assistant', '⚠️ Error connecting to the server. Please try again.');
                console.error('Error:', error);
            }
        }

        // Handle Enter key
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
